# Application name - identifier for this Spring Boot application
spring.application.name=springboot-backend-chat

# WebSocket - allowed origins for cross-origin requests (frontend URL)
websocket.allowed-origins=http://localhost:4200

# MongoDB connection URI - specifies the local MongoDB server and database name for chat data
spring.mongodb.uri = mongodb://localhost:27017/springboot_chat

# Logging level - sets debug logging for MongoDB template operations to track database queries
logging.level.org.springframework.data.mongodb.core.Mongotemplate=debug


# ============================================================================
# OAuth2 Client Configuration with Keycloak
# mywebclient is a unique identifier for this OAuth2 client registration
# ============================================================================

# Unique client identifier registered in Keycloak authorization server
spring.security.oauth2.client.registration.mywebclient.client-id = vmsecawebsocket

# Client secret credential for authenticating with Keycloak
spring.security.oauth2.client.registration.mywebclient.client-secret =vSYRHUr5OPlTsYlusjiRg2BaVI8C29id

# OAuth2 scopes requested from Keycloak - defines what user information and roles to retrieve in JWT claims
spring.security.oauth2.client.registration.mywebclient.scope = openid, profile, roles

# OAuth2 authorization flow type - uses authorization code flow for secure server-to-server token exchange
spring.security.oauth2.client.registration.mywebclient.authorization-grant-type = authorization_code

# Redirect URI - where Keycloak sends the authorization code after user login
spring.security.oauth2.client.registration.mywebclient.redirect-uri = http://localhost:9999/login/oauth2/code/mywebclient


# ============================================================================
# Keycloak Provider Endpoints - OAuth2 server endpoints for authentication
# ============================================================================

# Authorization endpoint - URL where users are redirected to authenticate with Keycloak
spring.security.oauth2.client.provider.mywebclient.authorization-uri = http://localhost:9999/realms/vmsecarealm/protocol/openid-connect/auth

# Token endpoint - URL to exchange authorization code for access token and refresh token
spring.security.oauth2.client.provider.mywebclient.token-uri = http://localhost:9999/realms/vmsecarealm/protocol/openid-connect/token

# UserInfo endpoint - URL to fetch authenticated user information and claims from Keycloak
spring.security.oauth2.client.provider.mywebclient.user-info-uri = http://localhost:9999/realms/vmsecarealm/protocol/openid-connect/userinfo

# Username attribute - JWT claim field used to extract the unique username for the authenticated user
spring.security.oauth2.client.provider.mywebclient.user-name-attribute = preferred_username

# ============================================================================
# JWT Token Validation Configuration
# ============================================================================

# JWK Set URI - URL containing public keys used to validate JWT token signatures from Keycloak
# Alternative: spring.security.oauth2.resourceserver.jwt.public-key-location=http://localhost:9999/realms/vmseca
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9999/realms/vmsecarealm/protocol/openid-connect/certs